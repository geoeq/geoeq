<svg width="200" height="200" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded background, gentle hue-shift on a 10s loop -->
  <rect x="0" y="0" width="512" height="512" rx="91" ry="91" fill="#1e4d8f">
    <animate attributeName="fill"
             values="#1e4d8f;#2563a8;#1a3570;#1e4d8f"
             dur="10s" repeatCount="indefinite" />
  </rect>

  <!-- Soft inner glow that pulses -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80"
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="opacity"
             values="0;0.12;0" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- The 'G' draws itself on a 3s cycle. dasharray > path length. -->
  <path d="M 307,108 C 230,108 131,182 131,273 C 131,364 230,438 307,438 C 352,438 381,420 381,420 L 381,296"
        fill="none" stroke="#ffffff" stroke-width="23"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="900" stroke-dashoffset="900">
    <animate attributeName="stroke-dashoffset"
             values="900;0;0;900"
             keyTimes="0;0.45;0.85;1"
             dur="4s" repeatCount="indefinite" />
  </path>

  <!-- '=' top line, fades in after the G finishes drawing -->
  <line x1="307" y1="256" x2="420" y2="256"
        stroke="#ffffff" stroke-width="16" stroke-linecap="round"
        stroke-dasharray="113" stroke-dashoffset="113">
    <animate attributeName="stroke-dashoffset"
             values="113;113;0;0;113"
             keyTimes="0;0.45;0.6;0.85;1"
             dur="4s" repeatCount="indefinite" />
  </line>

  <!-- '=' bottom line, fades in just after the top -->
  <line x1="307" y1="307" x2="420" y2="307"
        stroke="#ffffff" stroke-width="16" stroke-linecap="round"
        stroke-dasharray="113" stroke-dashoffset="113">
    <animate attributeName="stroke-dashoffset"
             values="113;113;113;0;0;113"
             keyTimes="0;0.45;0.55;0.7;0.85;1"
             dur="4s" repeatCount="indefinite" />
  </line>
</svg>
